 define "main" 
<div class="posts">
     range .Paginator.Pages 
    <article>
        <h2><a href=" .Permalink "> .Title </a></h2>
        <div class="meta">
            <span class="date"> .Date.Format "2 Jan 2006" </span>
            <span class="category"> with .Params.categories  index . 0  end </span>
            <span class="said-by"> .Params.said_by </span>
        </div>
        <p> .Summary </p>
    </article>
     end 
</div>
 template "_internal/pagination.html" . 
 end
